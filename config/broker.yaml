# Broker configuration
# Mode: simulation (default) | qmt (XtQuant live) | live (generic stub)
#
# Current workflow (discord_execute):
#   Agent decides buy/sell → Discord push with execution instructions
#   → User executes on broker app → Replies "买了X股代码 @价格"
#   → System records trade, settles capital, syncs portfolio

mode: simulation

simulation:
  record_all_orders: true
  max_simulation_orders: 1000

# Execution mode — controls how agent decisions reach the user/broker
# dry_run:          Full pipeline runs, logs everything, submits nothing
# confirm:          Orders wait for human confirmation via API/Discord
# auto:             Orders auto-execute after risk approval (requires QMT)
# discord_execute:  Push to Discord, user executes manually, records via NL
execution:
  mode: discord_execute
  auto_approve_below: 0         # CNY; orders below this auto-execute in 'auto' mode
  max_price_slippage_pct: 2.0   # Reject if price drifts > 2% from proposal

# QMT broker settings (used when mode: qmt)
# Credentials: prefer env vars QMT_ACCOUNT_ID, QMT_MINI_QMT_PATH
qmt:
  account_id: ''           # Fallback if env var not set
  mini_qmt_path: ''        # Fallback if env var not set
  max_order_amount: 100000 # Maximum single order amount (CNY)
  allowed_actions:
    - buy
    - sell

live:
  require_gate_verified: true     # Must pass ConfirmationGate VERIFIED
  require_explicit_config: true   # User must set mode=live manually
