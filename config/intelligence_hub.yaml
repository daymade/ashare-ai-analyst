# ── Source Layer Taxonomy ─────────────────────────────────────────────
# L1: Tier-1 wire services & regulators (highest trust)
# L2: Central banks & government data releases
# L3: Quality editorial / investigative journalism
# L4: Aggregator & curated RSS (mixed quality)
# L5: Social & community (lowest trust, needs verification)

