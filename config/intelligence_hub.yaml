# ── Classification ───────────────────────────────────────────────────
classification:
  category_rules:
    # Source-type overrides
    - match_source_type: policy
      category: policy
    - match_source_type: reddit
      category: social

    # Chinese keywords
    - match_keywords: ["降准","降息","LPR","MLF","货币政策","CPI","GDP","PMI"]
      category: macro
    - match_keywords: ["板块","行业","产业链","赛道","概念"]
      category: industry
    - match_keywords: ["公告","业绩","增持","减持","分红","回购"]
      category: company
    - match_keywords: ["美股","纳斯达克","港股","恒指","日经","原油","黄金"]
      category: global

    # English keywords
    - match_keywords: ["interest rate","rate hike","rate cut","inflation","Federal Reserve","Fed","ECB","Bank of Japan","BOJ","monetary policy","fiscal policy","treasury yield"]
      category: macro
    - match_keywords: ["S&P 500","Nasdaq","Dow Jones","FTSE","Nikkei","Hang Seng","crude oil","gold price","Wall Street","forex"]
      category: global
    - match_keywords: ["semiconductor","EV","electric vehicle","renewable energy","AI chip","supply chain","sector rotation"]
      category: industry
    - match_keywords: ["earnings","revenue","buyback","dividend","IPO","merger","acquisition","SEC filing"]
      category: company

  priority_rules:
    # Chinese keywords
    - match_keywords: ["紧急","突发","重大","暴跌","暴涨","熔断","停牌"]
      priority: breaking
    - match_keywords: ["降准","降息","IPO","注册制","印花税"]
      priority: high
    - match_source_type: policy
      priority: high

    # English keywords
    - match_keywords: ["breaking","flash crash","circuit breaker","emergency","plunge","surge","halt"]
      priority: breaking
    - match_keywords: ["rate cut","rate hike","FOMC","earnings beat","earnings miss"]
      priority: high

# ── Scoring Configuration (v23.0) ────────────────────────────────────
scoring:
  weights:
    source_weight: 45
    timeliness: 20
    cross_verification: 15
    domain_relevance: 10
    quality_signals: 10
    noise_penalty: 20

  timeliness_buckets:
    # hours -> decay factor
    - { max_hours: 1, factor: 1.0 }
    - { max_hours: 6, factor: 0.8 }
    - { max_hours: 24, factor: 0.5 }
    - { max_hours: 72, factor: 0.2 }
    - { max_hours: 999999, factor: 0.05 }

  quality_bonuses:
    has_summary: 0.4
    has_url: 0.3
    has_symbols: 0.3

  noise_thresholds:
    min_title_length: 10
    social_min_score: 5

# ── Health Tracking ──────────────────────────────────────────────────
health:
  warn_after_failures: 3
  down_after_failures: 8

# ── Anti-Filter-Bubble (Phase 2) ─────────────────────────────────────
anti_filter_bubble:
  enabled: true
  diversity_strength: medium  # low | medium | high
  min_non_interest_pct: 0.30
  layer_budgets:
    L1: 0.35
    L2: 0.15
    L3: 0.25
    L4: 0.15
    L5: 0.10
