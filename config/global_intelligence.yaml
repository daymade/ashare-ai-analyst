# Global Intelligence Agent Teams Configuration
# v39.0 — Per PRD-v39.0-global-intelligence-agent-teams.md

# v54: Source attention weights (BlackRock BGRI pattern)
# Higher weight = more influence on confidence scoring
source_weights:
  L1: 3.0   # Official (CSRC, PBOC, Fed press releases)
  L2: 2.0   # Professional (broker research, EIA, ECB)
  L3: 1.0   # Quality media (BBC, FT, SCMP, Guardian)
  L4: 0.5   # Aggregators (RSS reposts, RSSHub)
  L5: 0.3   # Social (Weibo, Guba, unverified)

event_bus:
  redis_url: "redis://redis:6379/1"
  consumer_prefix: "git"
  streams:
    sentinel:raw_intel: {maxlen: 10000}
    analyst:event_understood: {maxlen: 5000}
    analyst:causal_chain: {maxlen: 5000}
    analyst:event_state_change: {maxlen: 5000}
    strategist:signal: {maxlen: 5000}
    strategist:scenario: {maxlen: 5000}
    messenger:push: {maxlen: 5000}

