# --- Analyst Team ---
analyst:
  event_understanding:
    # ContentScore threshold to trigger LLM analysis
    score_threshold: 40
    # LLM model routing by source layer
    model_routing:
      l1_l2: "deepseek-chat"    # High priority → DeepSeek (best Chinese NLP)
      l3: "deepseek-chat"       # Medium → DeepSeek
      l4_l5: "deepseek-chat"    # Low → DeepSeek (cheapest)
    # A-share relevance threshold to publish event
    relevance_threshold: 0.3
    # Max LLM calls per refresh cycle
    max_llm_calls_per_cycle: 20
    # Batch size for tier 2/3 analysis
    batch_size: 5

  causal_chain:
    # Path to extended templates
    templates_file: "config/impact_chain_templates.yaml"
    # Whether to use LLM fallback when no template matches
    llm_fallback: true
    # Minimum A-share relevance to trigger LLM chain building
    llm_relevance_threshold: 0.4
    # Auto-persist discovered chains as candidate templates
    auto_persist_discoveries: true

  event_tracker:
    # Hours without mention before RESOLVED
    resolve_after_hours: 48
    # Mention frequency multiplier for ESCALATING
    escalation_multiplier: 3.0
    # Hours at PEAK before DE_ESCALATING
    peak_cooldown_hours: 6
    # Max concurrent tracked events
    max_active_events: 50

  historical_analogy:
    # Seed data file path
    seed_file: "data/event_history_seed.json"
    # Top-K analogies to return
    top_k: 3
    # Use embeddings (requires sentence-transformers)
    use_embeddings: false  # Enable when sentence-transformers installed

# --- Strategist Team ---
strategist:
  scenario_planner:
    # Only generate scenarios for events in these states
    trigger_states: ["developing", "escalating", "relapsed"]
    # LLM model for scenario generation
    model: "deepseek-chat"
    max_tokens: 1500

  risk_assessor:
    # Compound risk score threshold for CRITICAL alert
    critical_threshold: 70
    # Points per escalating event
    event_weight: 15
    # Points per BlackSwan alert
    black_swan_weight: 20
    # Points per cross-domain overlap
    domain_overlap_weight: 10

  opportunity_scanner:
    # Minimum chain confidence to scan for opportunities
    min_chain_confidence: 0.5
    # Require capital flow confirmation
    require_flow_confirmation: false

# --- Messenger Team ---
messenger:
  alert_routing:
    # Priority → channel mapping
    critical: "immediate+discord"
    high: "immediate"
    normal: "next_ooda_cycle"
    low: "daily_digest"

  digest:
    # Pre-market digest time (CST)
    pre_market_time: "08:30"
    # Post-market digest time (CST)
    post_market_time: "15:30"
    # LLM model for digest generation
    model: "deepseek-chat"
    max_tokens: 800

  dedup:
    # Redis TTL for event dedup (hours)
    ttl_hours: 4
